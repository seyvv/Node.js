<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail todo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 30px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            color: #1f2937;
        }

        .label {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .status {
            display: inline-block;
            margin-top: 8px;
            margin-bottom: 24px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
        }

        .done {
            background: #dcfce7;
            color: #166534;
        }

        .not-done {
            background: #fee2e2;
            color: #991b1b;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .btn-link {
            text-decoration: none;
            font-size: 14px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #eef2ff;
            color: #3730a3;
            font-weight: 600;
        }

        .btn-link:hover {
            background: #e0e7ff;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
            background: white;
        }

        button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .back {
            display: inline-block;
            margin-top: 24px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .back:hover {
            text-decoration: underline;
        }

        .priority-low {
            color: #1d4ed8;
        }

        .priority-normal {
            color: #374151;
        }

        .priority-high {
            color: #d86117;
        }

        .badge {
            display: inline-block;
            font-weight: 700;
        }

        .deleted-message {
            padding: 24px;
            border-radius: 12px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<script>
    const todoId = <%= todo.id %>;
    // místo protokolu http použijeme ws
    // adresa, port a cesta musí souhlasit s routou na serveru
    const ws = new WebSocket('ws://localhost:8000/ws');

    ws.addEventListener('open', () => {
        ws.send(JSON.stringify({
            type: 'subscribe-todo-detail',
            todoId,
        }));
    });

    // na clientovi místo .on používáme .addEventListener
    ws.addEventListener('message', (message) => {
        const json = JSON.parse(message.data);

        if (json.type === 'todo-detail') {
            document.getElementById('todo-detail').innerHTML = json.html;
        }

        if (json.type === 'todo-deleted') {
            document.getElementById('todo-detail').innerHTML = `
                <div class="deleted-message">
                    <h2>Todočko bylo smazáno :(</h2>
                </div>
            `;
        }
    });
</script>

<body>
    <div class="container">
        <h1>Detail todo</h1>

        <div id="todo-detail">
            <%- include ('_todo-detail.html') %>
        </div>

        <a class="back" href="/">← Zpět na seznam</a>
    </div>
</body>

</html>
